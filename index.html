    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f7; color: #1d1d1f; }

    header { background: #fff; border-bottom: 1px solid #e0e0e0; padding: 20px 24px; position: sticky; top: 0; z-index: 10; }
    header h1 { font-size: 1.4rem; font-weight: 700; }
    header p { font-size: 0.85rem; color: #888; margin-top: 4px; }

    .stats { display: flex; gap: 16px; padding: 20px 24px; flex-wrap: wrap; }
    .stat { background: #fff; border-radius: 12px; padding: 14px 20px; flex: 1; min-width: 120px; box-shadow: 0 1px 4px rgba(0,0,0,0.07); }
    .stat .num { font-size: 1.8rem; font-weight: 700; color: #0071e3; }
    .stat .label { font-size: 0.78rem; color: #888; margin-top: 2px; }

    .filters { padding: 0 24px 16px; display: flex; gap: 8px; flex-wrap: wrap; }
    .filter-btn { background: #fff; border: 1px solid #ddd; border-radius: 20px; padding: 6px 14px; font-size: 0.82rem; cursor: pointer; transition: all 0.2s; }
    .filter-btn:hover, .filter-btn.active { background: #0071e3; color: #fff; border-color: #0071e3; }

    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 16px; padding: 0 24px 40px; }

    .card { background: #fff; border-radius: 14px; overflow: hidden; box-shadow: 0 1px 4px rgba(0,0,0,0.08); transition: transform 0.2s, box-shadow 0.2s; }
    .card:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(0,0,0,0.12); }

    .card-image { width: 100%; height: 180px; background: linear-gradient(135deg, #e8f0fe, #d2e3fc); display: flex; align-items: center; justify-content: center; font-size: 3rem; position: relative; }
    .card-image img { width: 100%; height: 100%; object-fit: cover; }

    .score-badge { position: absolute; top: 10px; right: 10px; background: rgba(0,0,0,0.7); color: #fff; border-radius: 20px; padding: 4px 10px; font-size: 0.8rem; font-weight: 600; }
    .score-high { background: #34c759; }
    .score-mid { background: #ff9500; }
    .score-low { background: #8e8e93; }

    .new-badge { position: absolute; top: 10px; left: 10px; background: #ff3b30; color: #fff; border-radius: 20px; padding: 4px 10px; font-size: 0.75rem; font-weight: 700; }
    .excluded-badge { position: absolute; top: 10px; left: 10px; background: #8e8e93; color: #fff; border-radius: 20px; padding: 4px 10px; font-size: 0.75rem; font-weight: 700; }
    .verify-badge { position: absolute; top: 10px; left: 10px; background: #ff9500; color: #fff; border-radius: 20px; padding: 4px 10px; font-size: 0.75rem; font-weight: 700; }

    .card-body { padding: 16px; }
    .card-zone { font-size: 0.78rem; font-weight: 600; color: #0071e3; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px; }
    .card-title { font-size: 0.95rem; font-weight: 600; line-height: 1.3; margin-bottom: 12px; color: #1d1d1f; }

    .card-meta { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 14px; }
    .meta-item { background: #f5f5f7; border-radius: 8px; padding: 8px 10px; }
    .meta-item .val { font-size: 1rem; font-weight: 700; }
    .meta-item .key { font-size: 0.72rem; color: #888; margin-top: 1px; }

    .price-item { grid-column: 1 / -1; background: #f0f7ff; }
    .price-item .val { color: #0071e3; font-size: 1.15rem; }

    .card-link { display: block; text-align: center; background: #0071e3; color: #fff; padding: 10px; border-radius: 8px; text-decoration: none; font-size: 0.88rem; font-weight: 600; transition: background 0.2s; }
    .card-link:hover { background: #0058b0; }
    .card-link.disabled { background: #c7c7cc; cursor: default; }

    .date-chip { display: inline-block; background: #f5f5f7; border-radius: 20px; padding: 3px 10px; font-size: 0.75rem; color: #888; margin-bottom: 10px; }

    .empty { text-align: center; padding: 60px 20px; color: #888; grid-column: 1 / -1; }
    .empty .icon { font-size: 3rem; margin-bottom: 12px; }

    .card.excluded { opacity: 0.55; }

    @media (max-width: 600px) {
      .stats { gap: 10px; }
      .grid { grid-template-columns: 1fr; padding: 0 16px 40px; }
      header { padding: 16px; }
    }
  </style>
</head>

function scoreBadgeClass(s) {
  if (s === null) return 'score-low';
  if (s >= 8) return 'score-high';
  if (s >= 6) return 'score-mid';
  return 'score-low';
}

function formatPrice(p) {
  if (!p) return 'N/D';
  return '€' + p.toLocaleString('it-IT');
}

function renderCards(items) {
  const grid = document.getElementById('grid');
  if (items.length === 0) {
    grid.innerHTML = '<div class="empty"><div class="icon">🔍</div><p>Nessun annuncio per questa zona.</p></div>';
    return;
  }
  grid.innerHTML = items.sort((a,b) => {
    const sa = a.punteggio ?? -1;
    const sb = b.punteggio ?? -1;
    return sb - sa;
  }).map(a => `
    <div class="card${a.escluso ? ' excluded' : ''}" data-zona="${a.zona}">
      <div class="card-image">
        ${a.foto
          ? `<img src="${a.foto}" alt="${a.titolo}" onerror="this.style.display='none';this.parentElement.querySelector('.fallback').style.display='flex'">`
          : ''}
        <span class="fallback" style="display:${a.foto ? 'none' : 'flex'};width:100%;height:100%;align-items:center;justify-content:center;font-size:3rem">🏠</span>
        <span class="score-badge ${scoreBadgeClass(a.punteggio)}">${a.punteggio !== null && a.punteggio > 0 ? '⭐ ' + a.punteggio + '/10' : a.punteggio === null ? '?' : '—'}</span>
        ${a.nuovo && !a.escluso && !a.verifica ? '<span class="new-badge">NUOVO</span>' : ''}
        ${a.verifica && !a.escluso ? '<span class="verify-badge">DA VERIFICARE</span>' : ''}
        ${a.escluso ? '<span class="excluded-badge">ESCLUSO</span>' : ''}
      </div>
      <div class="card-body">
        <div class="card-zone">${a.zona}</div>
        <div class="card-title">${a.titolo}</div>
        <span class="date-chip">Trovato il ${new Date(a.data_vista).toLocaleDateString('it-IT', {day:'numeric',month:'long',year:'numeric'})}</span>
        <div class="card-meta">
          <div class="meta-item price-item">
            <div class="val">${formatPrice(a.prezzo)}</div>
            <div class="key">${a.prezzo && a.mq ? 'Prezzo · €' + Math.round(a.prezzo/a.mq).toLocaleString('it-IT') + '/mq' : 'Prezzo da verificare'}</div>
          </div>
          <div class="meta-item">
            <div class="val">${a.mq ? a.mq + ' mq' : 'N/D'}</div>
            <div class="key">Superficie</div>
          </div>
          <div class="meta-item">
            <div class="val">${a.punteggio !== null ? (a.punteggio > 0 ? a.punteggio + '/10' : '—') : '?/10'}</div>
            <div class="key">Punteggio</div>
          </div>
        </div>
        ${a.note ? `<p style="font-size:0.82rem;color:#555;margin-bottom:12px;line-height:1.4">${a.note}</p>` : ''}
        <a class="card-link ${!a.url || a.url === 'https://www.immobiliare.it' || a.url === 'https://www.idealista.it' ? 'disabled' : ''}"
           href="${a.url || '#'}" target="_blank" rel="noopener">
          ${!a.url || a.url === 'https://www.immobiliare.it' || a.url === 'https://www.idealista.it' ? 'Link non disponibile' : 'Vedi annuncio →'}
        </a>
      </div>
    </div>
  `).join('');
}

function filterZone(zona, e) {
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  if (e && e.target) e.target.classList.add('active');
  if (zona === 'tutti') renderCards(annunci);
  else renderCards(annunci.filter(a => a.zona.toLowerCase().includes(zona.toLowerCase())));
}

renderCards(annunci);
</script>
